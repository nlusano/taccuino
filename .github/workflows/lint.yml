name: Lint

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Yarn install
        run: |
          yarn

      - name: Lint
        run: |
          yarn lint
          yarn next telemetry disable

