name: Run tests

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
push:
  branches: [development]
pull_requests:
  branches: [development]
workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Run tests
    - uses: actions/checkout@v4
    - name: yarn install
      run: yarn
    - name: run tests
      run: yarn test

