name: Build

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Yarn install
        run: |
          yarn

      - name: Build
        run: |
          yarn build
